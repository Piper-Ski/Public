<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stakeholder Influence Plotter</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f1116;
        color: #e6e6e6;
        display: flex;
        height: 100vh;
    }

    /* LEFT PANEL */
    #formPanel {
        width: 360px;
        background: #1a1d24;
        padding: 25px;
        border-right: 2px solid #2a2d35;
        overflow-y: auto;
    }

    #formPanel h2 {
        margin-top: 0;
        font-size: 22px;
        color: #ffffff;
        font-weight: 600;
    }

    label {
        margin-top: 15px;
        display: block;
        font-size: 13px;
        color: #bfc4ce;
        font-weight: 600;
        letter-spacing: .5px;
    }

    input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        background: #0f1116;
        border: 1px solid #2f323a;
        color: #fff;
        border-radius: 6px;
    }

    .sliderRow {
        margin-top: 10px;
    }

    .sliderRow input[type="range"] {
        width: 100%;
        accent-color: #6a5acd;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #6a5acd;
        border: none;
        color: white;
        font-size: 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
    }

    button:hover {
        background: #7b6df0;
    }

    /* RIGHT PANEL */
    #mainPanel {
        flex: 1;
        padding: 25px;
        overflow-y: auto;
    }

    #mainPanel h2 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 10px;
        color: #ffffff;
    }

    /* TABLE */
    #stakeholderTable {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: #1a1d24;
        border-radius: 8px;
        overflow: hidden;
    }

    #stakeholderTable th {
        background: #2a2d35;
        padding: 10px;
        font-size: 13px;
        color: #cfd3db;
        letter-spacing: .5px;
    }

    #stakeholderTable td {
        padding: 10px;
        border-top: 1px solid #2f323a;
        text-align: center;
        color: #e6e6e6;
    }

    .editBtn, .deleteBtn {
        padding: 6px 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
    }

    .editBtn { background: #ffaa00; color: #000; }
    .deleteBtn { background: #d40000; color: #fff; }

</style>
</head>

<body>

<!-- LEFT PANEL -->
<div id="formPanel">
    <h2>Add Stakeholder</h2>

    <label>STAKEHOLDER NAME</label>
    <input type="text" id="name" placeholder="e.g. Executive Sponsor">

    <div class="sliderRow"><label>Upward</label><input type="range" id="upward" min="0" max="10" value="5"></div>
    <div class="sliderRow"><label>Downward</label><input type="range" id="downward" min="0" max="10" value="5"></div>
    <div class="sliderRow"><label>Outward</label><input type="range" id="outward" min="0" max="10" value="5"></div>
    <div class="sliderRow"><label>Sideways</label><input type="range" id="sideways" min="0" max="10" value="5"></div>
    <div class="sliderRow"><label>Inward</label><input type="range" id="inward" min="0" max="10" value="5"></div>
    <div class="sliderRow"><label>Forward</label><input type="range" id="forward" min="0" max="10" value="5"></div>
    <div class="sliderRow"><label>Backward</label><input type="range" id="backward" min="0" max="10" value="5"></div>

    <button onclick="addStakeholder()">Add Stakeholder</button>
    <button style="background:#444;margin-top:10px;" onclick="clearForm()">Reset Form</button>
</div>

<!-- RIGHT PANEL -->
<div id="mainPanel">
    <h2>Influence Radar</h2>
    <div id="chart" style="width:100%;height:500px;"></div>

    <h2>Stakeholder Data</h2>
    <table id="stakeholderTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Up</th><th>Down</th><th>Out</th><th>Side</th>
                <th>In</th><th>Fwd</th><th>Bwd</th>
                <th>Score</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
let stakeholders = [];
let editIndex = null;

function addStakeholder() {
    const name = document.getElementById("name").value.trim();
    if (!name) return alert("Enter a stakeholder name.");

    const data = {
        name,
        upward: +document.getElementById("upward").value,
        downward: +document.getElementById("downward").value,
        outward: +document.getElementById("outward").value,
        sideways: +document.getElementById("sideways").value,
        inward: +document.getElementById("inward").value,
        forward: +document.getElementById("forward").value,
        backward: +document.getElementById("backward").value
    };

    if (editIndex !== null) {
        stakeholders[editIndex] = data;
        editIndex = null;
    } else {
        stakeholders.push(data);
    }

    clearForm();
    renderTable();
    renderChart();
}

function clearForm() {
    document.getElementById("name").value = "";
    ["upward","downward","outward","sideways","inward","forward","backward"]
        .forEach(id => document.getElementById(id).value = 5);
}

function renderTable() {
    const tbody = document.querySelector("#stakeholderTable tbody");
    tbody.innerHTML = "";

    stakeholders.forEach((s, i) => {
        const score = s.upward + s.downward + s.outward + s.sideways +
                      s.inward + s.forward + s.backward;

        const row = `
            <tr>
                <td>${s.name}</td>
                <td>${s.upward}</td>
                <td>${s.downward}</td>
                <td>${s.outward}</td>
                <td>${s.sideways}</td>
                <td>${s.inward}</td>
                <td>${s.forward}</td>
                <td>${s.backward}</td>
                <td>${score}</td>
                <td>
                    <button class="editBtn" onclick="editStakeholder(${i})">Edit</button>
                    <button class="deleteBtn" onclick="deleteStakeholder(${i})">Delete</button>
                </td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}

function editStakeholder(i) {
    const s = stakeholders[i];
    editIndex = i;

    document.getElementById("name").value = s.name;
    document.getElementById("upward").value = s.upward;
    document.getElementById("downward").value = s.downward;
    document.getElementById("outward").value = s.outward;
    document.getElementById("sideways").value = s.sideways;
    document.getElementById("inward").value = s.inward;
    document.getElementById("forward").value = s.forward;
    document.getElementById("backward").value = s.backward;
}

function deleteStakeholder(i) {
    stakeholders.splice(i, 1);
    renderTable();
    renderChart();
}

function renderChart() {
    const directions = [
        "Upward","Forward","Outward","Downward",
        "Backward","Inward","Sideways"
    ];

    const traces = stakeholders.map(s => ({
        type: "scatterpolar",
        r: [
            s.upward, s.forward, s.outward, s.downward,
            s.backward, s.inward, s.sideways
        ],
        theta: directions,
        fill: "toself",
        name: s.name,
        line: { width: 2 }
    }));

    const layout = {
        paper_bgcolor: "#0f1116",
        plot_bgcolor: "#0f1116",
        font: { color: "#e6e6e6" },
        polar: {
            bgcolor: "#1a1d24",
            radialaxis: { visible: true, range: [0, 10], color:"#aaa" },
            angularaxis: { color:"#ccc" }
        },
        showlegend: true,
        legend: { bgcolor:"#1a1d24" }
    };

    Plotly.newPlot("chart", traces, layout);
}

// Sample data
stakeholders.push(
    {name:"Executive Sponsor", upward:9, downward:7, outward:6, sideways:4, inward:5, forward:8, backward:3},
    {name:"Project Manager", upward:5, downward:8, outward:7, sideways:9, inward:6, forward:7, backward:2},
    {name:"End User Group", upward:2, downward:3, outward:5, sideways:6, inward:8, forward:4, backward:3}
);

renderTable();
renderChart();
</script>

</body>
</html>
